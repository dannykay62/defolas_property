
services:
  django:
    build:
      context: .
      dockerfile: docker/django/Dockerfile

    container_name: defolas_django

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app_network

    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 3
    
  postgres:
    image: postgres:17

    container_name: defolas_postgres

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - app_network

  nginx:
    image: nginx:1.28-alpine

    container_name: defolas_nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    depends_on:
      - django

    networks:
      - app_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  app_network:
    driver: bridge