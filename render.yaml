services:
  - type: web
    name: defola-project
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn defola_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: defola-db
          property: connectionString