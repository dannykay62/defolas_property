{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-20 px-4">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-gradient-to-br from-teal-500 to-teal-700 rounded-xl flex items-center justify-center mx-auto mb-4">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3L21 9.5V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9.5Z" fill="white"/></svg>
      </div>
      <h1 class="font-display text-3xl font-bold text-gray-900">Sign In</h1>
      <p class="text-gray-500 text-sm mt-1">Welcome back to Defola's Properties</p>
    </div>
    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 mb-5 text-sm">Invalid username or password.</div>
      {% endif %}
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Username</label>
          {{ form.username }}
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Password</label>
          {{ form.password }}
        </div>
      </div>
      <button type="submit" class="w-full mt-6 py-3 bg-teal-600 hover:bg-teal-500 text-white rounded-xl font-semibold transition-colors">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
